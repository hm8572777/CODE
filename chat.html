<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المساعد الذكي | الكوتش حمزة محمد</title>
    <style>
        :root {
            --primary-color: #27ae60;
            --secondary-color: #2c3e50;
            --background-color: #f4f7f6;
        }
        body { font-family: sans-serif; background: var(--background-color); margin: 0; padding: 0; direction: rtl; }
        nav { background: var(--secondary-color); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        nav .logo { color: white; font-size: 1.2rem; font-weight: bold; }
        nav ul { list-style: none; margin: 0; padding: 0; display: flex; gap: 20px; }
        nav ul li a { color: white; text-decoration: none; font-weight: bold; }
        
        .chat-container { max-width: 700px; margin: 30px auto; background: white; border-radius: 12px; box-shadow: 0px 5px 25px rgba(0,0,0,0.06); overflow: hidden; display: flex; flex-direction: column; height: 600px; border-top: 5px solid var(--primary-color); }
        .chat-header { background: var(--secondary-color); color: white; padding: 20px; font-size: 1.3rem; font-weight: bold; text-align: center; }
        .chat-logs { flex: 1; padding: 20px; overflow-y: auto; background: #f9f9f9; display: flex; flex-direction: column; gap: 15px; }
        
        .msg { padding: 12px 16px; border-radius: 8px; max-width: 75%; font-size: 1rem; line-height: 1.5; }
        .msg.bot { background: #e2e8f0; color: #2d3748; align-self: flex-start; border-bottom-right-radius: 0; }
        .msg.user { background: var(--primary-color); color: white; align-self: flex-end; border-bottom-left-radius: 0; }
        
        .typing { color: #777; font-size: 0.9rem; font-style: italic; display: none; align-self: flex-start; padding: 10px; }
        .chat-input-box { display: flex; border-top: 1px solid #eee; padding: 15px; background: white; }
        .chat-input-box input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 6px; outline: none; font-size: 1rem; }
        .chat-input-box button { background: var(--primary-color); color: white; border: none; padding: 0 25px; margin-right: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; }
    </style>
</head>
<body>

<nav>
    <div class="logo">موقع الكوتش حمزة محمد 🎓</div>
    <ul>
        <li><a href="index.html">الرئيسية</a></li>
        <li><a href="booking.html">حجز استشارة 📅</a></li>
    </ul>
</nav>

<div class="chat-container">
    <div class="chat-header">المساعد الذكي المتصل بـ Gemini 🤖</div>
    <div class="chat-logs" id="chatLogs">
        <div class="msg bot">مرحباً بك! أنا المساعد الذكي الخاص بالكوتش حمزة محمد. كيف يمكنني مساعدتك اليوم؟</div>
        <div class="typing" id="typingIndicator">جاري التفكير وجلب الرد...</div>
    </div>
    <div class="chat-input-box">
        <input type="text" id="chatInput" placeholder="اكتب سؤالك هنا واضغط Enter..." onkeypress="checkEnter(event)">
        <button onclick="sendMessage()">إرسال</button>
    </div>
</div>

<script>
    const apiKey = "AQ.Ab8RN6KHejVkrA7u8PnN36WXQ33MHRZ0jtVg-CT5q9ZERAHYxA";

    function checkEnter(event) {
        if (event.key === 'Enter') { sendMessage(); }
    }

    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        input.value = '';

        const indicator = document.getElementById('typingIndicator');
        indicator.style.display = 'block';
        indicator.scrollIntoView();

        try {
            // استخدام رابط v1beta مع نموذج gemini-pro المتوافق مع حسابك السحابي الحالي
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`;

            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    "contents": [{
                        "parts": [{
                            "text": `أنت مساعد ذكي مخصص لموقع الكوتش حمزة محمد (خبير رعاية وتطوير السلوك وبناء المرونة النفسية). أجب عن سؤال المستخدم باختصار وبصفتك مساعد الكوتش: ${text}`
                        }]
                    }]
                })
            });

            const data = await response.json();
            indicator.style.display = 'none';

            if (data.candidates && data.candidates[0].content && data.candidates[0].content.parts[0].text) {
                let botReply = data.candidates[0].content.parts[0].text;
                appendMessage(botReply, 'bot');
            } else {
                appendMessage("تلقيت رسالتك بنجاح! يمكنك أيضاً الانتقال لصفحة الحجز للتواصل المباشر مع الكوتش حمزة.", "bot");
            }

        } catch (error) {
            indicator.style.display = 'none';
            console.error("Gemini API Error:", error);
            appendMessage("عذراً، واجهت مشكلة بسيطة في الاتصال. يرجى إعادة المحاولة.", "bot");
        }
    }

    function appendMessage(text, sender) {
        const logs = document.getElementById('chatLogs');
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('msg', sender);
        msgDiv.innerText = text;
        
        const indicator = document.getElementById('typingIndicator');
        logs.insertBefore(msgDiv, indicator);
        logs.scrollTop = logs.scrollHeight;
    }
</script>
</body>
</html>
